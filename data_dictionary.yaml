# W-43-DATA-DICTIONARY-PHASE1 — wie-ops API-consumer dictionary
#
# Authoritative inventory of wie-ops's dependencies on external systems.
# wie-ops has no database of its own; its dependency surface is:
#   1. HTTP: the wie API at VITE_API_BASE_URL (primary)
#   2. SQL:  scripts/audits/w38_scan.py reads wie's DB directly (secondary)
#
# Structural half (the `endpoints` list under http_consumer_contract) is
# auto-generated by scripts/generate_data_dictionary_structure.py. Do not
# hand-edit that block; edit src/api/client.js and re-run the scanner.
#
# Semantic half (descriptions, consumed_fields, error_handling) is the work
# of Phase 2. Phase 1 locks down WHAT wie-ops calls; Phase 2 locks down
# WHAT SHAPE each response must have for the UI not to break.

version: 1
phase: 1
phase_scope: structural_inventory_only
session_tag: W-43-DATA-DICTIONARY-PHASE1-20260419
generated_on: 2026-04-19
repo: wie-ops
upstream_api:
  base_url_env: VITE_API_BASE_URL
  production: https://wie-v27l.onrender.com
  local_dev: http://localhost:8100
pattern_source: W-42-DATA-DICTIONARY-PHASE1 (wie repo)
pattern_adaptation: |
  wie-ops is a pure frontend (React 19 + Vite 8, static site on Render).
  It has no DATABASE_URL, no ORM, no migrations. The W-42 structural
  scanner's role — introspect information_schema — is replaced here by
  scanning src/api/client.js for apiFetch(...) call sites. The verifier's
  role — diff documented columns against pg_catalog — is replaced by
  probing wie's /openapi.json and diffing documented endpoints against
  FastAPI's auto-spec.

# -------------------------------------------------------------------------
# PRIMARY: HTTP consumer contract
# -------------------------------------------------------------------------
http_consumer_contract:
  source_file: src/api/client.js
  transport: fetch (browser)
  auth:
    header: X-WIE-API-Key
    source: localStorage['wie_api_key']
    wrapper_fn: getAuthHeaders (client.js:3-8)
  error_handling:
    wrapper_fn: apiFetch (client.js:10-24)
    policy: |
      Non-2xx responses throw Error(err.detail || `HTTP ${status}`). UI pages
      surface errors via useAPI's error state (src/hooks/useAPI.js). Two
      known sites swallow errors defensively:
        - SystemHealth.jsx:36  getQualityIssues().catch(() => ({...})
        - SystemHealth.jsx:37  getOpsHealth().catch(() => null)
        - HealthDashboard.jsx:84 getDataHealthExtended().catch(() => null)
        - Layout.jsx:12 getHealth() fire-and-forget for indicator pulse

