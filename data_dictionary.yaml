# -------------------------------------------------------------------------
# SECONDARY: SQL consumer contract
# -------------------------------------------------------------------------
# wie-ops normally does not touch the wie DB. The one exception is the W-38
# audit script, which connects directly for a read-only integrity scan. The
# script imports wie's SQLAlchemy engine via a hard-coded sys.path insert to
# the wie repo (see w38_scan.py:44) — this cross-repo coupling is noted as a
# finding (see w38_scan_cross_repo_import below).
sql_consumer_contract:
  scripts:
    - path: scripts/audits/w38_scan.py
      purpose: Read-only regions-integrity scan (authority + self-distribution).
      connection: |
        Uses wie's DATABASE_URL via `from database import engine` after
        `sys.path.insert(0, "<wie repo>")` (w38_scan.py:44-45). READ-ONLY —
        executes only SELECTs. Print asserts "WRITES EXECUTED: NONE".
      tables_read:
        - name: regions
          columns: [id, name, subregion, zone, country, parent_region]
          predicate: "WHERE r.id != 13"
          cross_ref_wie_dictionary: regions (wie W-42 Phase 1 dictionary)
          notes: |
            Excludes regions.id=13 (owned by parallel W-38 session). regions.name
            is UNIQUE — self-distribution on name is inert (see feedback memory
            regions_self_distribution_inert.md).
        - name: wine_families
          columns: [id, region_id]
          purpose: Left-join for wf_count impact score per region.
          cross_ref_wie_dictionary: wine_families (wie W-42 Phase 1 dictionary)
      authority_list:
        variable: AUTHORITY (w38_scan.py:54-267)
        size_approx: 95
        domain: top global wine regions (country, zone) by PDO/AOC dominance
        modification_policy: |
          Additions/edits require Steve's review. An incorrect authority entry
          silently vouches for a corrupted row, hiding it from future scans.
          PRs modifying AUTHORITY must cite a public source in the commit msg
          (Wikipedia, PDO/AOC registries, or equivalent).
      writes: NONE (READ-ONLY)
      invocation: python scripts/audits/w38_scan.py
      env_required: [DATABASE_URL]

# -------------------------------------------------------------------------
# Operational notes
# -------------------------------------------------------------------------
operational_notes:
  - id: auto_deploy_asymmetry
    description: |
      wie-ops auto-deploys on push to main (Render static site defaults);
      wie (backend) does NOT auto-deploy. Pushing a breaking client.js
      change to main ships to production wie-ops immediately, while wie
      would still need a separate deploy action. Keep this asymmetry in
      mind when staging coordinated frontend/backend changes.
    source: render.yaml; confirmed 2026-04-19
  - id: password_gate_not_auth
    description: |
      VITE_OPS_PASSWORD gates UI access at the login page — it is NOT
      transport auth. API authentication is X-WIE-API-Key (from localStorage
      'wie_api_key'), injected by getAuthHeaders() in client.js.
  - id: single_fetch_chokepoint
    description: |
      All HTTP traffic funnels through apiFetch in src/api/client.js. There
      are zero direct fetch() calls elsewhere in src/. This makes the
      structural scanner's single-file parse sufficient.

# -------------------------------------------------------------------------
# Phase 1 findings — surfaced, not fixed
# -------------------------------------------------------------------------
findings:
  stale_in_CLAUDE_md:
    # Endpoints listed in CLAUDE.md whose path has no matching apiFetch call.
    count: 0
    entries: []
  undocumented_in_CLAUDE_md:
    # Endpoints called by client.js but NOT listed in CLAUDE.md's endpoint
    # block. Recommend reconciling CLAUDE.md in a follow-up session.
    count: 9
    entries:
      - path: /admin/override/pillar/{overrideId}
        method: DELETE
        client_fn: deletePillarOverride
      - path: /ops/api-platform/endpoint-health
        method: GET
        client_fn: getEndpointHealth
      - path: /ops/audit
        method: GET
        client_fn: [getAuditLog, getAuditTrail]
        note: |
          CLAUDE.md lists /ops/audit/tables only. The bare /ops/audit path
          (query-string driven) is the primary audit-viewer surface and is
          missing from the documented set.
      - path: /ops/audit/export
        method: GET
        client_fn: getAuditExportUrl
      - path: /ops/pipelines/{pipelineId}/history
        method: GET
        client_fn: getPipelineHistory
      - path: /ops/wine/{wineId}/recompute
        method: POST
        client_fn: recomputeWine
      - path: /ops/wine/{wineId}/region
        method: PATCH
        client_fn: updateWineRegion
      - path: /ops/wine/{wineId}/tier
        method: PATCH
        client_fn: updateWineTier
      - path: /ops/wiqs/history/{wineFamilyId}
        method: GET
        client_fn: getWIQSHistory
  orphan_client_fns:
    # Exported from client.js but never referenced by any page/component.
    # Either dead code or placeholders for unshipped features. Surface only,
    # no removal — the backend endpoints may still be legitimate.
    count: 2
    entries:
      - id: unretireFamily
        path: /admin/families/{wineFamilyId}/unretire
        hypothesis: Retire has UI (CatalogBrowser.jsx:592); unretire never wired up.
      - id: recomputeRegion
        path: /admin/recompute/region
        hypothesis: Region-level recompute flow may have been superseded by batchRecompute('region', ...).
  w38_scan_cross_repo_import:
    # w38_scan.py lives in wie-ops but imports wie's SQLAlchemy engine via
    # sys.path hack. Pins the wie repo path at the absolute filesystem level.
    severity: medium
    location: scripts/audits/w38_scan.py:44-45
    description: |
      `sys.path.insert(0, "/Users/StephenShyn/Desktop/.../wie")` — the script
      cannot run on any machine where wie isn't checked out at that exact
      absolute path. Portability issue, not a correctness issue. Candidate
      for Phase 2 (e.g., honour a WIE_REPO env var, or relocate the script
      into wie/scripts/audits/).
  openapi_status:
    # Phase 1 does not verify against wie's live OpenAPI. The verifier
    # supports both paths; Phase 1 merely records the target.
    probe_url: https://wie-v27l.onrender.com/openapi.json
    probed_this_session: false
    note: |
      Verifier (scripts/verify_data_dictionary.py) will probe on first CI run.
      If /openapi.json returns 200, verifier runs shape-diff mode. If 404/5xx,
      verifier downgrades to endpoint-liveness mode and emits an observability
      finding.

